AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  Serverless AI Image Moderation System — S3 + Lambda + Rekognition + SNS + API Gateway.
  Images uploaded to S3 are automatically scanned for unsafe/explicit content;
  flagged results trigger SNS alerts and are queryable via a REST API.

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        SNS_TOPIC_ARN: !Ref ModerationAlertsTopic
        CONFIDENCE_THRESHOLD: '80'
        MIN_LABEL_CONFIDENCE: '60'
        MODERATION_TABLE: !Ref ModerationResultsTable
        QUARANTINE_BUCKET: !Ref QuarantineBucket
        UPLOAD_BUCKET: !Ref ImageUploadBucket
        URL_EXPIRY_SECONDS: '300'

Parameters:
  AlertEmail:
    Type: String
    Description: Email address to subscribe to moderation alerts
    Default: ''

Resources:

  # ---------- S3 Buckets ----------
  ImageUploadBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'image-moderation-uploads-${AWS::AccountId}'
      CorsConfiguration:
        CorsRules:
          - AllowedMethods: [PUT, GET]
            AllowedOrigins: ['*']
            AllowedHeaders: ['*']
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: s3:ObjectCreated:*
            Function: !GetAtt ModerateImageFunction.Arn

  QuarantineBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'image-moderation-quarantine-${AWS::AccountId}'

  ImageUploadBucketPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ModerateImageFunction
      Principal: s3.amazonaws.com
      SourceArn: !Sub 'arn:aws:s3:::image-moderation-uploads-${AWS::AccountId}'
      SourceAccount: !Ref AWS::AccountId

  # ---------- DynamoDB ----------
  ModerationResultsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: ImageModerationResults
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  # ---------- SNS ----------
  ModerationAlertsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: image-moderation-alerts
      DisplayName: Image Moderation Alerts

  ModerationAlertsEmailSubscription:
    Type: AWS::SNS::Subscription
    Condition: HasAlertEmail
    Properties:
      TopicArn: !Ref ModerationAlertsTopic
      Protocol: email
      Endpoint: !Ref AlertEmail

  # ---------- Lambda: S3-triggered moderation ----------
  ModerateImageFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: moderate-image
      Handler: moderate_image.lambda_handler
      CodeUri: lambda/
      Policies:
        - S3ReadPolicy:
            BucketName: !Sub 'image-moderation-uploads-${AWS::AccountId}'
        - S3WritePolicy:
            BucketName: !Sub 'image-moderation-uploads-${AWS::AccountId}'
        - S3CrudPolicy:
            BucketName: !Sub 'image-moderation-quarantine-${AWS::AccountId}'
        - DynamoDBCrudPolicy:
            TableName: !Ref ModerationResultsTable
        - SNSPublishMessagePolicy:
            TopicName: !GetAtt ModerationAlertsTopic.TopicName
        - Statement:
            - Effect: Allow
              Action:
                - rekognition:DetectModerationLabels
              Resource: '*'

  # ---------- Lambda: API Gateway handler ----------
  ApiHandlerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: image-moderation-api
      Handler: api_handler.lambda_handler
      CodeUri: lambda/
      Policies:
        - S3WritePolicy:
            BucketName: !Sub 'image-moderation-uploads-${AWS::AccountId}'
        - DynamoDBReadPolicy:
            TableName: !Ref ModerationResultsTable
      Events:
        UploadUrl:
          Type: Api
          Properties:
            RestApiId: !Ref ModerationApi
            Path: /upload-url
            Method: POST
        Status:
          Type: Api
          Properties:
            RestApiId: !Ref ModerationApi
            Path: /status/{key+}
            Method: GET

  # ---------- API Gateway ----------
  ModerationApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: prod
      Cors:
        AllowMethods: "'GET,POST,OPTIONS'"
        AllowHeaders: "'Content-Type'"
        AllowOrigin: "'*'"

Conditions:
  HasAlertEmail: !Not [!Equals [!Ref AlertEmail, '']]

Outputs:
  ApiEndpoint:
    Description: Base URL for the REST API
    Value: !Sub 'https://${ModerationApi}.execute-api.${AWS::Region}.amazonaws.com/prod'
  UploadBucketName:
    Value: !Ref ImageUploadBucket
  QuarantineBucketName:
    Value: !Ref QuarantineBucket
  AlertsTopicArn:
    Value: !Ref ModerationAlertsTopic
  ModerationTableName:
    Value: !Ref ModerationResultsTable
